services:
  emby-soso:
    build: .
    image: emby-soso:latest
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL to your external database}
      REDIS_URL: ${REDIS_URL:-}
      REDIS_ENABLED: ${REDIS_ENABLED:-auto}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      TMDB_BASE_URL: ${TMDB_BASE_URL:-https://api.themoviedb.org/3}
      TMDB_LANGUAGE: ${TMDB_LANGUAGE:-zh-CN}
      DATA_SOURCE_ROOT: ${DATA_SOURCE_ROOT:-/data/source}
      DATA_LIBRARY_ROOT: ${DATA_LIBRARY_ROOT:-/data/library}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ${SOURCE_VOLUME:-./data/source}:/data/source
      - ${LIBRARY_VOLUME:-./data/library}:/data/library
    restart: unless-stopped
