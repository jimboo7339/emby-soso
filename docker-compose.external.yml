# 仅运行应用，连接已有 PostgreSQL / MySQL / Redis（不包含数据库容器）
services:
  emby-soso:
    image: ${EMBY_SOSO_IMAGE:-ghcr.io/jimboo7339/emby-soso:latest}
    build: .
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL to your external database}
      REDIS_URL: ${REDIS_URL:-}
      REDIS_ENABLED: ${REDIS_ENABLED:-auto}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      TMDB_BASE_URL: ${TMDB_BASE_URL:-https://api.themoviedb.org/3}
      TMDB_LANGUAGE: ${TMDB_LANGUAGE:-zh-CN}
      DATA_SOURCE_ROOT: ${DATA_SOURCE_ROOT:-/data/source}
      DATA_LIBRARY_ROOT: ${DATA_LIBRARY_ROOT:-/data/library}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WEB_WORKERS: ${WEB_WORKERS:-2}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-change-me}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-change-me-use-a-long-random-string-in-production}
      AUTH_TOKEN_EXPIRE_HOURS: ${AUTH_TOKEN_EXPIRE_HOURS:-168}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
    volumes:
      - ${SOURCE_VOLUME:-./data/source}:/data/source
      - ${LIBRARY_VOLUME:-./data/library}:/data/library
    restart: unless-stopped
