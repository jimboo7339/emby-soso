services:
  emby-soso:
    image: ${EMBY_SOSO_IMAGE:-ghcr.io/jimboo7339/emby-soso:latest}
    build: .
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://emby:emby@postgres:5432/emby_soso}
      REDIS_URL: ${REDIS_URL:-}
      REDIS_ENABLED: ${REDIS_ENABLED:-auto}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      TMDB_BASE_URL: ${TMDB_BASE_URL:-https://api.themoviedb.org/3}
      TMDB_LANGUAGE: ${TMDB_LANGUAGE:-zh-CN}
      DATA_SOURCE_ROOT: ${DATA_SOURCE_ROOT:-/data/source}
      DATA_LIBRARY_ROOT: ${DATA_LIBRARY_ROOT:-/data/library}
      SCHEDULER_ENABLED: ${SCHEDULER_ENABLED:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      WEB_WORKERS: ${WEB_WORKERS:-2}
    volumes:
      - ${SOURCE_VOLUME:-./data/source}:/data/source
      - ${LIBRARY_VOLUME:-./data/library}:/data/library
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-emby}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-emby}
      POSTGRES_DB: ${POSTGRES_DB:-emby_soso}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-emby} -d ${POSTGRES_DB:-emby_soso}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mysql:
    image: mysql:8.4
    profiles: ["mysql"]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-emby_soso}
      MYSQL_USER: ${MYSQL_USER:-emby}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-emby}
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u${MYSQL_USER:-emby}", "-p${MYSQL_PASSWORD:-emby}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    profiles: ["redis"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  pg_data:
  mysql_data:
  redis_data:
