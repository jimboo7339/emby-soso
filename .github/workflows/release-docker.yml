name: Release Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "手动推送的镜像标签（如 1.0.0 或 latest）"
        required: true
        default: "latest"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub (optional)
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Resolve GHCR tags
        id: ghcr_tags
        run: |
          REPO_LC=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="${{ env.REGISTRY }}/${REPO_LC}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tags=${IMAGE}:${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          {
            echo "tags<<EOF"
            echo "${IMAGE}:${VERSION}"
            echo "${IMAGE}:${VERSION%.*}"
            MAJOR="${VERSION%%.*}"
            echo "${IMAGE}:${MAJOR}"
            if [ "${{ github.event.release.prerelease }}" != "true" ]; then
              echo "${IMAGE}:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Resolve Docker Hub tags (optional)
        id: hub_tags
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tags=${{ secrets.DOCKERHUB_USERNAME }}/emby-soso:${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          {
            echo "tags<<EOF"
            echo "${{ secrets.DOCKERHUB_USERNAME }}/emby-soso:${VERSION}"
            echo "${{ secrets.DOCKERHUB_USERNAME }}/emby-soso:${VERSION%.*}"
            MAJOR="${VERSION%%.*}"
            echo "${{ secrets.DOCKERHUB_USERNAME }}/emby-soso:${MAJOR}"
            if [ "${{ github.event.release.prerelease }}" != "true" ]; then
              echo "${{ secrets.DOCKERHUB_USERNAME }}/emby-soso:latest"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.ghcr_tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64

      - name: Build and push to Docker Hub (optional)
        if: ${{ steps.hub_tags.outputs.tags != '' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.hub_tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
