# PostgreSQL 允许 Docker 容器访问宿主机 PG 的 pg_hba.conf 示例
# 文件位置因发行版而异，常见：
#   Linux: /var/lib/pgsql/data/pg_hba.conf 或 /etc/postgresql/*/main/pg_hba.conf
#   Docker 官方 postgres 镜像: 挂载卷内 pg_hba.conf
#
# 在 postgresql.conf 中确保：
#   listen_addresses = '*'          # 或至少包含宿主机内网 IP
#
# 在 pg_hba.conf 末尾追加（按你的 Docker 网段调整）：

# Docker 默认 bridge 网段（docker0 常见为 172.17.0.0/16）
host    emby_soso    emby_soso    172.16.0.0/12    scram-sha-256

# 若 compose 使用自定义网络，可改为更精确的网段，例如：
# host    emby_soso    emby_soso    172.18.0.0/16    scram-sha-256

# 仅本机 + Docker 网关（更保守，容器经 host.docker.internal 转发时可能不够，优先用上条）
# host    emby_soso    emby_soso    127.0.0.1/32     scram-sha-256

# 修改后重载：
#   sudo systemctl reload postgresql
#   或  SELECT pg_reload_conf();
